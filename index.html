<!DOCTYPE html>
<html>
<head>
    <title>Overlook Views Distribution Route Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { padding: 0; margin: 0; }
        #map { height: 100vh; width: 100vw; }

        .leaflet-tooltip.route-label {
            background: transparent;
            border: none;
            box-shadow: none;
            font-weight: bold;
            color: #333; /* Or white, depending on your basemap */
            font-size: 14px;
        }
        .leaflet-tooltip-left:before, .leaflet-tooltip-right:before {
            display: none; /* Removes the little speech-bubble arrow */
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/wicket/1.3.8/wicket.min.js"></script>

<script>
    // Initialize the map centered on Portland, OR
    var map = L.map('map').setView([45.5627, -122.6888], 16);


    // Variable to keep track of the currently clicked polygon
    var currentlyHighlightedLayer = null;

    // Add a basemap (Carto Voyager)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    // Paste your Google Sheets published CSV URL here
    var sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCjPE3f8mwbv27TQbM_pPIr7A9rSB6uOgzthygaFU2U6IJNtJ3M1B_ZGpVRr64JTX3LQhbPdfAqRC4/pub?gid=928354747&single=true&output=csv';

    // Fetch and parse the CSV
    Papa.parse(sheetCsvUrl, {
        download: true,
        header: true,
        complete: function(results) {
            var data = results.data;
            
            data.forEach(function(row) {
                // Skip empty rows
                if (!row.WKT) return; 

                // Parse WKT to GeoJSON
                var wkt = new Wkt.Wkt();
                try {
                    wkt.read(row.WKT);
                } catch (e) {
                    console.error("Invalid WKT for route: " + row.Route_ID);
                    return;
                }
                var geojsonFeature = wkt.toJson();

                // Determine color based on status
                var polyColor = (row.Status && row.Status.toLowerCase() === 'complete') ? 'blue' : 'orange';

                var defaultStyle = {
                    color: polyColor,
                    weight: 2,
                    fillOpacity: 0.2
                };

                // Add to map
                L.geoJSON(geojsonFeature, {
                    style: defaultStyle,
                    onEachFeature: function (feature, layer) {
                        
                    // Store the default style directly on the layer object so we remember it later
                    layer.defaultStyle = defaultStyle;

                    // Listen for the click event
                    layer.on('click', function (e) {
                        
                        // A. If another polygon is already highlighted, reset it to its default style
                        if (currentlyHighlightedLayer) {
                            currentlyHighlightedLayer.setStyle(currentlyHighlightedLayer.defaultStyle);
                        }

                        // B. Get the polygon that was just clicked
                        var clickedLayer = e.target;

                        // C. Apply the highlight style (keeping the status color, but making it bolder)
                        clickedLayer.setStyle({
                            color: clickedLayer.defaultStyle.color, // Keeps it blue or orange
                            weight: 5,                              // Thicker border
                            fillOpacity: 0.8                        // Darker, more solid fill
                        });

                        // D. Update our tracking variable so we know this is now the active layer
                        currentlyHighlightedLayer = clickedLayer;
                    });
                    }
                    }).bindPopup(
                        "<b>Route:</b> " + row.Route_ID + "<br>" +
                        "<b>Person:</b> " + row.Volunteer + "<br>" +
                        "<b>Status:</b> " + row.Status
                    ).bindTooltip(
                        row.Route_ID, // The text inside the label
                        {
                            permanent: true,       // Keeps the label visible at all times
                            direction: "center",   // Centers it inside the polygon
                            className: "route-label" // Allows you to style it in CSS if you want
                        }
                    ).addTo(map);
            });
        }
    });
</script>

</body>
</html>
